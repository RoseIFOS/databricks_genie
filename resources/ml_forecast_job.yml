# =============================================================================
# resources/ml_forecast_job.yml  —  JOB que treina o modelo de forecast
# =============================================================================
#
# Este arquivo declara UM recurso do tipo "job" (Lakeflow Jobs / Workflows).
# O job executa o notebook ml/forecast_sales.py em um schedule.
#
# Como ler: resources > jobs > <chave_interna> > { propriedades do job }
# A <chave_interna> (aqui "forecast_sales_job") é como você o referencia:
#   databricks bundle run forecast_sales_job -t dev
# =============================================================================
resources:
  jobs:
    forecast_sales_job:

      # Nome exibido na UI. ${bundle.target} injeta "dev"/"prd" para diferenciar.
      name: "[${bundle.target}] HPN • Forecast de Vendas"

      # -----------------------------------------------------------------------
      # TAREFAS: um job tem 1+ tasks. Aqui, uma única task que roda o notebook.
      # -----------------------------------------------------------------------
      tasks:
        - task_key: train_forecast          # identificador da task dentro do job

          notebook_task:
            # Caminho RELATIVO a este bundle. O deploy sobe o notebook e ajusta
            # o caminho no workspace automaticamente.
            notebook_path: ../ml/forecast_sales.py

            # Parâmetros lidos no notebook via dbutils.widgets.get(...).
            # Passamos o catálogo do ambiente para o notebook não ter hardcode.
            base_parameters:
              catalog: ${var.catalog}
              # Histórico do gold termina em nov/2025; 14 meses cobre até jan/2027
              # (i.e., 2026 inteiro, com folga). Validado manualmente em 2026-07-16.
              horizon_months: "14"

          # ---------------------------------------------------------------------
          # COMPUTE: SERVERLESS. Este workspace é serverless-only — job cluster
          # clássico é REJEITADO no deploy ("Only serverless compute is supported
          # in the workspace"). As libs vão no bloco 'environments' abaixo,
          # referenciado por este environment_key.
          # ---------------------------------------------------------------------
          environment_key: forecast_env

      # -----------------------------------------------------------------------
      # AMBIENTE SERVERLESS (referenciado por environment_key na task). As libs
      # do notebook são declaradas aqui como dependencies. prophet>=1.1.6 =
      # compatível com NumPy 2 (mesma correção do notebook; manter em sincronia
      # com o %pip de lá — se um pin mudar, muda nos dois).
      # -----------------------------------------------------------------------
      environments:
        - environment_key: forecast_env
          spec:
            client: "1"
            dependencies:
              - prophet>=1.1.6
              - mlflow>=2.16

      # -----------------------------------------------------------------------
      # SCHEDULE: quando roda. Em mode:development o bundle PAUSA isto sozinho.
      # Cron no formato Quartz (segundo minuto hora dia mês dia-semana).
      # "0 0 5 * * ?" = todo dia às 05:00.
      # -----------------------------------------------------------------------
      schedule:
        quartz_cron_expression: "0 0 5 * * ?"
        timezone_id: "America/Sao_Paulo"

      # -----------------------------------------------------------------------
      # NOTIFICAÇÃO em caso de falha.
      # -----------------------------------------------------------------------
      email_notifications:
        on_failure:
          - ${var.notification_email}

      # -----------------------------------------------------------------------
      # TAGS: essenciais para FinOps (atribuição de custo por domínio/projeto).
      # Aparecem em system.billing.usage.
      # -----------------------------------------------------------------------
      tags:
        projeto: hpn_bi_genie
        dominio: comercial
        ambiente: ${bundle.target}
