# =============================================================================
# METRIC VIEW — COMERCIAL
# Tradução das medidas DAX de vendas (_Key Measures) para Unity Catalog.
# Criação (UI mais garantida):
#   Catalog Explorer > 4_semantic > Create > Metric View > cola este YAML > nome mv_comercial.
#   (ou via DDL CREATE VIEW ... WITH METRICS, se a versão suportar / Asset Bundle na Fase 10.)
# Fonte: 4_semantic.v_sales_transactions (transações unificadas venda/devolução, já
#        denormalizadas + custo via lookup). Por isso NÃO há joins aqui.
# =============================================================================
version: 0.1

source: hpn.`4_semantic`.v_sales_transactions

dimensions:
  # ---- Tempo ----
  - name: Data
    expr: order_date
  - name: Ano
    expr: order_year
  - name: Mes
    expr: order_month
  # ---- Cliente ----
  - name: Cliente
    expr: customer_name
  - name: TipoNegocio
    expr: business_type
  # ---- Geografia ----
  - name: Regiao
    expr: region_name
  - name: Pais
    expr: country_name
  - name: Cidade
    expr: city_name
  # ---- Produto ----
  - name: Categoria
    expr: category_name
  - name: Subcategoria
    expr: subcategory_name
  - name: Produto
    expr: product_name

measures:
  # ---- Base ----
  - name: Gross Sales           # DAX: SUMX(fSalesDetails, OrderQuantity*UnitPrice)
    expr: SUM(CASE WHEN transaction_type = 'sale' THEN gross_amount END)
  - name: Returns               # DAX: SUMX(fSalesReturns, ReturnQuantity*UnitPrice)
    expr: SUM(CASE WHEN transaction_type = 'return' THEN gross_amount END)
  - name: Discounts             # DAX: SUM(fSalesDetails[Discount Amount])
    expr: SUM(discount_amount)
  - name: Cost of Sales         # DAX: SUMX(fSalesDetails, OrderQuantity*[Unit Cost])
    expr: SUM(CASE WHEN transaction_type = 'sale' THEN quantity * unit_cost END)
  - name: Quantity              # DAX: SUM(fSalesDetails[OrderQuantity])
    expr: SUM(CASE WHEN transaction_type = 'sale' THEN quantity END)
  - name: Customers Current     # DAX: DISTINCTCOUNT(fSalesDetails[CustomerKey])
    expr: COUNT(DISTINCT CASE WHEN transaction_type = 'sale' THEN customer_key END)

  # ---- Compostas (reescritas inline: metric view não referencia outra measure) ----
  - name: Net Sales             # DAX: [Gross Sales]-[Discounts]-[Returns]
    expr: >
      SUM(CASE WHEN transaction_type = 'sale' THEN gross_amount END)
      - SUM(discount_amount)
      - SUM(CASE WHEN transaction_type = 'return' THEN gross_amount END)
  - name: Gross Margin          # DAX: [Net Sales]-[Cost of Sales]
    expr: >
      SUM(CASE WHEN transaction_type = 'sale' THEN gross_amount END)
      - SUM(discount_amount)
      - SUM(CASE WHEN transaction_type = 'return' THEN gross_amount END)
      - SUM(CASE WHEN transaction_type = 'sale' THEN quantity * unit_cost END)

  # ---- Percentuais (NULLIF protege /0) ----
  - name: Gross Margin %        # DAX: DIVIDE([Gross Sales]-[Cost of Sales],[Gross Sales])
    expr: >
      (SUM(CASE WHEN transaction_type = 'sale' THEN gross_amount END)
       - SUM(CASE WHEN transaction_type = 'sale' THEN quantity * unit_cost END))
      / NULLIF(SUM(CASE WHEN transaction_type = 'sale' THEN gross_amount END), 0)
  - name: Net Margin %          # DAX: DIVIDE([Net Sales]-[Cost of Sales],[Net Sales])
    expr: >
      (SUM(CASE WHEN transaction_type = 'sale' THEN gross_amount END) - SUM(discount_amount)
       - SUM(CASE WHEN transaction_type = 'return' THEN gross_amount END)
       - SUM(CASE WHEN transaction_type = 'sale' THEN quantity * unit_cost END))
      / NULLIF(SUM(CASE WHEN transaction_type = 'sale' THEN gross_amount END) - SUM(discount_amount)
       - SUM(CASE WHEN transaction_type = 'return' THEN gross_amount END), 0)
  - name: "% Returns"           # DAX: DIVIDE([Returns],[Gross Sales])
    expr: >
      SUM(CASE WHEN transaction_type = 'return' THEN gross_amount END)
      / NULLIF(SUM(CASE WHEN transaction_type = 'sale' THEN gross_amount END), 0)
  - name: Avg Unit Price        # DAX: AVERAGE(fSalesDetails[UnitPrice])
    expr: AVG(CASE WHEN transaction_type = 'sale' THEN unit_price END)
  - name: Avg Unit Cost         # DAX: AVERAGE(fSalesDetails[Unit Cost])
    expr: AVG(CASE WHEN transaction_type = 'sale' THEN unit_cost END)

# -----------------------------------------------------------------------------
# NOTAS DE TRADUÇÃO
# - Time intelligence (YoY %, MoM %, Last 12M): NÃO vão no metric view.
#   Faça via consulta com window functions ou funções SQL (ver 02_functions.sql)
#   e cadastre como "example SQL" / trusted asset no Genie.
# - Classificação de clientes (RFM / Champions / At Risk / Lost): materializada
#   em gold + funções (ver 02_functions.sql), não como measure.
# - Formatação (USD vs quantidade) é responsabilidade do app / Genie instructions.
# - unit_cost NULL (venda sem custo casado) subestima Cost of Sales e infla margem:
#   validar na paridade vs Power BI antes de liberar.
# =============================================================================
