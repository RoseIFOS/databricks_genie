# =============================================================================
# [ALTERNATIVA] Runtime do Databricks App usando Streamlit.
# Para usar ESTA versão em vez de React+FastAPI, faça o deploy apontando o
# source_code_path do app (em ../../resources/app.yml) para esta pasta,
# OU copie este command para o app.yaml principal.
# =============================================================================
command:
  - streamlit
  - run
  - app.py

# Caminho "a" (Genie-nativo): só precisa dos IDs dos Spaces. Sem Model Serving
# e sem LakeBase — a análise avançada vem do próprio Genie (trusted assets ml.*).
env:
  - name: GENIE_SPACE_COMERCIAL          # "Sales and Customer Insights"
    value: "01f18051e31d1bc4bad157b84c3a33ec"
  - name: GENIE_SPACE_FINANCEIRO         # "Financial Performance Analysis"
    value: "01f1807aaf5a19e494d430c3f176166d"
